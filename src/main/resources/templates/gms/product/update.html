//Ajax공통 호출
function callAjax(ajaxInfo){
	var dfd = $.Deferred();
	$.ajax(ajaxInfo).done(function(data){
		dfd.resolve(data);
	});
	
	return dfd.promise();
}

function goUpdate(){	
	form.submit();
}


$(document).ready(function(){ 

	var counter = [[${productPriceSeqLast}]];	
	var listCounter = [[${productPriceList.size()}]]-1;	
	var productPriceSeqs = "[[${productPriceSeqs}]]";
	var arrProudct = productPriceSeqs.split(",");
	
	var orderCount = 0;
	$("#addrow").on("click", function () {
        counter++;	//productPriceSeq index
        listCounter ++;		
        if (listCounter > 100){

          alert('더 이상 추가 할수 없습니다.');
          return false;

        }
        var newRow = $("<tr>");
        var colsBefore = '<input type="hidden" id="productPriceSeq_'+ counter + '" name="productPriceSeq_'+ counter + '" value="'+counter+'">';
        newRow.append(colsBefore);
        var cols ='';//'<input type="hidden" id="productPriceSeq_'+ counter + '" name="productPriceSeq_'+ counter + '" value="'+counter+'">';
        cols += '<td>';
        cols += '<input type="text" class="form-control" id="productCapa_'+ counter + '" name="productCapa_'+ counter + '" placeholder="상품용량">';
		cols += '</td><td style="padding-left: 0px;">';
        cols += '<input type="text" class="form-control" id="productPrice_'+ counter + '" name="productPrice_'+ counter + '" placeholder="대여가격">';        
		cols += '</td><td>';		
		cols += '<input type="text" class="form-control" id="eCountCd_'+ counter + '" name="eCountCd_'+ counter + '" placeholder="ECount">';
        cols += '</td><td style="padding-left: 0px;">';
        cols += '<input type="text" class="form-control" id="productBottlePrice_'+ counter + '" name="productBottlePrice_'+ counter + '" placeholder="판매가격">';        
		cols += '</td><td>';		
		cols += '<input type="text" class="form-control" id="eCountCdS_'+ counter + '" name="eCountCdS_'+ counter + '" placeholder="판매ECount">';
        cols += '</td><td>';
        cols += ' <input type="button" class="ibtnDel btn btn-md btn-danger" id="addrow" value="삭제" /> ';
        cols += '</td>';

        cols +='</tr>';        
        newRow.append(cols);
        
        arrProudct.push(counter);
        
        var seqString =""; 
        for(let i = 0; i < arrProudct.length; i++) {
            seqString  += arrProudct[i];
            if(i < arrProudct.length -1) seqString  += ",";
    	}
        $("#productPriceSeqs").val(seqString);
        
        $("#priceCount").val(listCounter+1);
        $("table.doc-list").append(newRow);
    });

    //수정시 row 추가

     var mod_counter = 0;    
    
    // row 삭제
    $("table.doc-list").on("click", ".ibtnDel", function (event) {
    	// 현재 버튼이 있는 tr
        let row = $(this).closest("tr");

        // hidden input value 가져오기
        let delproductPriceSeq = row.find("input[type='hidden']").val();

        $(this).closest("tr").remove();       
       // counter -= 1		// count는 그대로 유지
        listCounter -= 1
        
     // array for문으로 같은 value가 있는지 찾음
        for(let i = 0; i < arrProudct.length; i++) {
            if (arrProudct[i]-delproductPriceSeq == 0) {
            	arrProudct.splice(i, 1);
            }
        }
   
     	var seqString =""; 
        for(let i = 0; i < arrProudct.length; i++) {
            seqString  += arrProudct[i];
            if(i < arrProudct.length -1) seqString  += ",";
    	}

        $("#productPriceSeqs").val(seqString);
        $("#priceCount").val(listCounter+1);
    });
    
 // row 삭제
    $("table.doc-list").on("click", ".ibtnNoDel", function (event) {
    	alert("판매이력이 있는 상품입니다. 삭제가 안됩니다.");ㄴ
    });

    $("table.mod-doc-list").on("click", ".ibtnDelMod", function (event) {
        $(this).closest("tr").remove();       
        mod_counter -= 1
    });
    
    
});


</script>

   <div class="content-wrapper">
    <!-- Content Header (Page header) -->

        </div>

                      	<input type="radio" name="saleCtype" id="saleCtype" value="C" th:unless="${product.saleCtype =='C'}"> 영업용
                      	<input type="radio" name="saleCtype" id="saleCtype" value="F" th:if="${product.saleCtype =='F'}" checked="">

					               th:unless="${product.gasId ==row.gasId}">
					        </option>				
                        </select>
                        </th>
                    </tr>            
                  </thead>
                </table>        
                <div class="form-group">

                         <td>대여가격</td>

                         <td>판매가격</td>

                       <tr th:if="${not #lists.isEmpty( productPriceList )}" th:each="row : ${productPriceList}" >
               			<input type="hidden" th:id="'productPriceSeq_'+${row.productPriceSeq}" th:name="'productPriceSeq_'+${row.productPriceSeq}" th:value="${row.productPriceSeq}">
	                       <td> 
	                         <input type="text" class="form-control" th:id="'productCapa_'+${row.productPriceSeq}" th:name="'productCapa_'+${row.productPriceSeq}" th:value="${row.productCapa}">

	                       </td>	                       
	                       <td>

	                       </td>   
	                       <td style="padding-left: 0px;">                                           
	                         <input type="text" class="form-control" th:id="'productBottlePrice_'+${row.productPriceSeq}" th:name="'productBottlePrice_'+${row.productPriceSeq}" th:value="${row.productBottlePrice}">
	                       </td>	                       
	                       <td> 
	                         <input type="text" class="form-control" th:id="'eCountCdS_'+${row.productPriceSeq}" th:name="'eCountCdS_'+${row.productPriceSeq}" th:value="${row.eCountCdS}">

	                       <td th:unless="${session.LoginUser.userAuthority=='99'}">
	                       </td>
                       </tr>
                     </table>
                     </div>
                 </div>
                
              </div>
            </div>
            <!-- /.card -->
            
            <div class="card-footer">
                 <a href="/gms/product/list.do" class="btn btn-secondary float-left">목록</a>
		          <input th:if="${session.LoginUser.userAuthority=='99'}" type="submit" value="저장"  class="btn btn-success float-right">
                </div>		     		
            </form>   
          	
        </div>
        
        <!-- /.row -->
      </div><!-- /.container-fluid -->

  </div>
