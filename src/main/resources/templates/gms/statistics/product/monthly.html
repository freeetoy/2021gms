<script type="text/javascript">
$(document).ready(function(){ 
	 $("#searchStatDt").val('[[${searchStatDt}]]' );
	 
	var searchProductId =  $('#searchProductId').val();
	 
	 if('[[${productPriceSeq}]]' > 0) {
		 getProductPriceList(searchProductId,2);
	 }

	// 품명 선택 변경
    $('#searchProductId').change( function(){

		var productId = $('#searchProductId').val();

		getProductPriceList(productId,1);
	});
});
	
	
$(function() {
	
	  $('input[name="searchStatDt"]').daterangepicker({
	      autoUpdateInput: false,
	      startDate: new Date(),
	      locale: {
	    	  cancelLabel: 'Clear',
	          "format": 'YYYY/MM'     // 일시 노출 포맷
	      }
	  });
	
	  $('input[name="searchStatDt"]').on('apply.daterangepicker', function(ev, picker) {
	      $(this).val(picker.startDate.format('YYYY/MM') + ' - ' + picker.endDate.format('YYYY/MM'));
	  });
	
	  $('input[name="searchStatDt"]').on('cancel.daterangepicker', function(ev, picker) {
	      $(this).val('');
	  });	
	  
	$(".btn_select_process1").click(function()  
	{		
		let searchProductId = $("#searchProductId").val();
		let productPriceSeq = $("#productPriceSeq").val();
		
		var searchDt = $(this).attr('searchDt'); 
		var sType = $(this).attr('sType'); 
		
			$("table.mod-doc-list1").find('tr').remove();			
			
			var newRowlist = $("<tr>");	
			var colslist1 = "";
		
			colslist1 += '<th>거래처명</th>';
			colslist1 += '<th>건수</th>';
			colslist1 += '<th>작업</th>';
			colslist1 += '</tr>';
			
			newRowlist.append(colslist1);
			$("table.mod-doc-list1").append(newRowlist);		

			var ajaxInfo ={
				type:"POST",
				data:{
					searchProductId : searchProductId,
					productPriceSeq : productPriceSeq,
					gubunType : 2,
					searchDt : searchDt,
					sType : sType
				},
				url:"/gms/statistics/product/detailList.do",			
				dataType: "json",
			};
				
			ajax = callAjax(ajaxInfo);
			
			ajax.done(function(data){
				for(i=0; i< data.length;i++) {
					var newRowlist1 = $("<tr>");	
					var colslist = "";
				
					colslist += '<td>'+ data[i].customerNm +'</td>';
					colslist += '<td>'+ data[i].statCount +'</td>';
					colslist += '<td>'+ data[i].workCdNm +'</td>';
				//	colslist += '<td>'+ data[i].bottleWorkCdNm +'</td>';
				//	colslist += '<td>'+ data[i].bottleWorkNm +'</td>';
					colslist += '</tr>';
					
					newRowlist1.append(colslist);
					$("table.mod-doc-list1").append(newRowlist1);
				}	
					
			})
		       .fail(function(){
			  console.log("fail");
		});
	});
				  
	function callAjax(ajaxInfo){
			var dfd = $.Deferred();
			$.ajax(ajaxInfo).done(function(data){
				dfd.resolve(data);
			});
			
			return dfd.promise();
	}	
	
});	

function getProductPriceList(searchProductId, type){  
	
	$.ajax({
		url: '/gms/product/priceList.do',
		type: 'POST',
		data: 'productId='+ searchProductId ,
		dataType: 'json',

	 })
	.done(function(data){	           
    	var i=0;
    	$('#productPriceSeq' ).find('option').remove(); 
		//$('#productCapa_' + sel_pid).find('option').remove(); 
		for(i=0; i< data.length;i++) {
			if(type==2 && '[[${productPriceSeq}]]' == data[i].productPriceSeq )
				$('#productPriceSeq' ).append('<option value='+data[i].productPriceSeq+' selected>'+data[i].productCapa+'</option>')
			else
				$('#productPriceSeq' ).append('<option value='+data[i].productPriceSeq+'>'+data[i].productCapa+'</option>')					
		}
		
	})
	.fail(function(){
		console.log("fail");
	 });
} 
</script>
